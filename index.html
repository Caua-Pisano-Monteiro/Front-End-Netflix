<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        </head>
<body>
    <main>
        <header>
            <img src="assets/Logo-Netflix-Symbol.png" alt="Logo Netflix" class="logo">
            <h1>Quem está assistindo?</h1>
            <button id="themeToggle" type="button" aria-label="Alternar tema">Ativar modo claro</button>
        </header>

        <section class="container" aria-label="Perfis de usuário">
            <article class="profile">
                <figure>
                    <img src="/assets/imagem-1.png" alt="Neyma Jr">
                    <figcaption>Neyma Jr</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <img src="/assets/imagem-2.png" alt="Robinho">
                    <figcaption>Robinho</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <img src="/assets/imagem-3.png" alt="Daniel Alves">
                    <figcaption>Daniel Alves</figcaption>
                </figure>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
